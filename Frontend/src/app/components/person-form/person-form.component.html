<div class="modal fade" id="personModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Nueva Persona</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form #personForm="ngForm" (ngSubmit)="onSubmit()">
          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <div class="mb-3">
            <label class="form-label">Nombre *</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="person.name"
              name="name"
              required
              minlength="2">
          </div>

          <div class="mb-3">
            <label class="form-label">Apellido *</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="person.lastName"
              name="lastName"
              required
              minlength="2">
          </div>

          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input
              type="email"
              class="form-control"
              [(ngModel)]="person.email"
              name="email"
              required
              email>
          </div>

          <div class="mb-3">
            <label class="form-label">Edad *</label>
            <input
              type="number"
              class="form-control"
              [(ngModel)]="person.age"
              name="age"
              required
              min="18"
              max="150">
          </div>

          <div class="mb-3">
            <label class="form-label">Región *</label>
            <select
              class="form-select"
              [(ngModel)]="person.regionId"
              name="regionId"
              (ngModelChange)="onRegionChange()"
              required>
              <option value="">Seleccione una región</option>
              <option *ngFor="let region of regions" [value]="region.id">
                {{ region.name }}
              </option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Comuna *</label>
            <select
              class="form-select"
              [(ngModel)]="person.communeId"
              name="communeId"
              required
              [disabled]="!person.regionId">
              <option value="">Seleccione una comuna</option>
              <option *ngFor="let commune of communes" [value]="commune.id">
                {{ commune.name }}
              </option>
            </select>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal">
              Cancelar
            </button>
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="submitting || !personForm.valid">
              <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
              Guardar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
