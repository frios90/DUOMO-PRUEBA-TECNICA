<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Listado de personas</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#personModal">
      <i class="fas fa-plus"></i> Nueva persona
    </button>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error">
    <div class="table-responsive">
      <table class="table table-hover table-striped">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Edad</th>
            <th>Región</th>
            <th>Comuna</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="people.length === 0">
            <td colspan="8" class="text-center text-muted py-4">
              No hay personas registradas
            </td>
          </tr>
          <tr *ngFor="let person of people; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ person.name }}</td>
            <td>{{ person.lastName }}</td>
            <td>{{ person.email }}</td>
            <td>{{ person.age }}</td>
            <td>{{ person.regionName }}</td>
            <td>{{ person.communeName }}</td>
            <td>
              <button class="btn btn-sm btn-danger" (click)="deletePerson(person.id!)">
                <i class="fas fa-trash"></i> eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-3 text-muted">
      Total: {{ people.length }} persona(s)
    </div>
  </div>
</div>

<app-person-form (personCreated)="loadPeople()"></app-person-form>
